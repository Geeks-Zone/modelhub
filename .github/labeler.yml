# Configuração de labels automáticos para PRs

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - 'docs/**/*'

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'package.json'
          - 'pnpm-lock.yaml'
          - 'package-lock.json'
          - 'yarn.lock'

frontend:
  - changed-files:
      - any-glob-to-any-file:
          - 'components/**/*'
          - 'app/**/*.tsx'
          - 'app/**/*.jsx'
          - '**/*.css'

backend:
  - changed-files:
      - any-glob-to-any-file:
          - 'server/**/*'
          - 'lib/**/*'
          - 'app/api/**/*'

database:
  - changed-files:
      - any-glob-to-any-file:
          - 'prisma/**/*'

tests:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.test.ts'
          - '**/*.test.tsx'
          - '**/*.spec.ts'
          - '**/*.spec.tsx'
          - 'vitest.config.ts'

ci-cd:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**/*'
          - 'Dockerfile'
          - 'docker-compose.yml'
          - 'vercel.json'

configuration:
  - changed-files:
      - any-glob-to-any-file:
          - '*.config.*'
          - '.env.example'
          - 'tsconfig.json'
          - '.prettierrc'
          - '.editorconfig'
