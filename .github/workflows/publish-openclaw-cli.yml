name: Publish OpenClaw CLI

on:
  push:
    tags:
      - 'openclaw-cli-v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Validate package version against tag
        if: startsWith(github.ref, 'refs/tags/openclaw-cli-v')
        env:
          EXPECTED_VERSION: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${EXPECTED_VERSION#openclaw-cli-v}"
          PACKAGE_VERSION="$(node -p "require('./packages/openclaw-cli/package.json').version")"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package version ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Smoke test CLI help
        run: node ./packages/openclaw-cli/bin/modelhub-openclaw.mjs --help

      - name: Publish package
        run: npm publish --access public --provenance
        working-directory: ./packages/openclaw-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
